<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Invoice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Montserrat:wght@400;600&family=Merriweather:wght@300;700&family=Open+Sans:wght@400;600&family=Oswald:wght@300;500&family=Raleway:wght@400;600&family=Poppins:wght@400;600;700&family=Rubik:wght@400;500;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Segoe UI',sans-serif;background:#eef1f5;padding:20px;color:#333;font-size:14px;}
        .wrap{display:flex;gap:20px;max-width:1200px;margin:0 auto;}
        .side{flex:0 0 320px;background:#fff;padding:22px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.05);height:fit-content;position:sticky;top:20px;overflow-y:auto;max-height:calc(100vh - 40px);}
        .side h2{font-size:16px;color:#2c3e50;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
        .fg{margin-bottom:10px;}
        .fg label{display:block;font-weight:600;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
        .fg input,.fg textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-family:inherit;font-size:13px;}
        .fg input:focus,.fg textarea:focus{border-color:#667eea;outline:none;box-shadow:0 0 0 3px rgba(102,126,234,.1);}
        .fg textarea{resize:vertical;}
        .sep{border:0;border-top:1px solid #eee;margin:12px 0;}
        .btn{width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s;}
        .btn-g{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 15px rgba(102,126,234,.3);}
        .btn-g:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,.4);}
        .btn-t{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;box-shadow:0 4px 12px rgba(245,87,108,.2);margin-top:7px;}
        .btn-t:hover{box-shadow:0 6px 18px rgba(245,87,108,.3);}
        .btn-s{background:#f0f2f5;color:#444;border:1px solid #ddd;margin-top:7px;}
        .btn-s:hover{background:#e4e7eb;}
        .btn-d{background:#fde8e8;color:#c0392b;border:1px solid #f5c6c6;margin-top:7px;}
        .btn-d:hover{background:#fbd0d0;}
        .btn-add{background:#f0f7ff;color:#667eea;border:1px dashed #a0b4f0;margin-top:8px;font-weight:600;}
        .btn-add:hover{background:#e0ecff;border-color:#667eea;}
        .ir{display:flex;gap:6px;align-items:center;margin-bottom:8px;animation:fadeIn .2s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
        .ir .i-d{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;min-width:0;}
        .ir .i-d:focus{border-color:#667eea;outline:none;}
        .ir .i-a{width:88px;padding:7px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;flex-shrink:0;}
        .ir .i-a:focus{border-color:#667eea;outline:none;}
        .rb{width:28px;height:28px;border:1px solid #f5c6c6;background:#fde8e8;color:#c0392b;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;}
        .rb:hover{background:#fbd0d0;}
        .rb:disabled{opacity:.3;cursor:not-allowed;}
        .st{margin-top:6px;text-align:right;font-size:13px;font-weight:700;color:#667eea;padding:8px 12px;background:#f8f9ff;border-radius:6px;border:1px solid #e8ecff;}
        .ic-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600;}
        .ir-hdr{display:flex;gap:6px;margin-bottom:4px;padding:0 0 2px;}
        .ir-hdr span{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.3px;}
        .ir-hdr .h-d{flex:1;}
        .ir-hdr .h-a{width:88px;}
        .ir-hdr .h-x{width:28px;}
        .hist{margin-top:12px;max-height:160px;overflow-y:auto;border-top:1px solid #eee;padding-top:8px;}
        .hist-t{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
        .badge{display:inline-block;background:#f0f2f5;padding:3px 8px;border-radius:20px;font-size:10px;margin:2px;cursor:pointer;color:#666;transition:all .2s;}
        .badge:hover{background:#667eea;color:#fff;}
        .prev{flex:1;background:#eef1f5;padding:25px;border-radius:12px;overflow:auto;display:flex;justify-content:center;align-items:flex-start;min-height:calc(100vh - 40px);}
        #cv{background:#fff;width:210mm;min-height:297mm;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.12);-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:50px;display:flex;flex-direction:column;}
        .ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
        .ov.on{display:flex;}
        .mdl{background:#fff;border-radius:16px;width:93%;max-width:1100px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 25px 80px rgba(0,0,0,.25);}
        .mdl-h{padding:16px 22px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
        .mdl-h h3{font-size:16px;color:#2c3e50;}
        .mdl-x{background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:2px 8px;border-radius:6px;line-height:1;}
        .mdl-x:hover{color:#333;background:#f0f0f0;}
        .mdl-s{padding:12px 22px;border-bottom:1px solid #f0f0f0;}
        .mdl-s input{width:100%;padding:9px 14px;border:2px solid #eee;border-radius:10px;font-size:13px;}
        .mdl-s input:focus{border-color:#667eea;outline:none;}
        .mdl-b{padding:16px 22px;overflow-y:auto;flex:1;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
        .card{border:2px solid #eee;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;background:#fff;position:relative;}
        .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:#ccc;}
        .card.sel{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15);}
        .card-top{height:40px;display:flex;align-items:center;justify-content:center;}
        .card-top span{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;opacity:.9;}
        .card-mid{height:60px;padding:6px;background:#fafbfc;position:relative;overflow:hidden;}
        .card-name{padding:6px 8px;font-size:9px;font-weight:700;color:#444;text-align:center;border-top:1px solid #f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .card .chk{position:absolute;top:4px;right:4px;width:17px;height:17px;background:#667eea;color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;}
        .card.sel .chk{display:flex;}
        @media print{body{background:#fff;padding:0;}.wrap{display:block;}.side{display:none!important;}.prev{padding:0;background:#fff;}#cv{box-shadow:none;width:100%;min-height:auto;}.ov{display:none!important;}}
        @media(max-width:900px){.wrap{flex-direction:column;}.side{flex:none;position:static;width:100%;max-height:none;}#cv{width:100%;min-height:auto;padding:30px;}.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}.mdl{width:97%;max-height:90vh;}}
    </style>
</head>
<body>
<div class="wrap">
    <div class="side">
        <h2>Bill Generator</h2>
        <div class="fg"><label>Your Name / Company</label><input type="text" id="pN" placeholder="Your Business Name"></div>
        <div class="fg"><label>Your Address</label><textarea id="pA" rows="2">Hyderabad, Telangana, India</textarea></div>
        <hr class="sep">
        <div class="fg"><label>Client Name</label><input type="text" id="cN" value="VASAVI SILKS PVT LTD"></div>
        <div class="fg"><label>Client Address</label><textarea id="cA" rows="3">Edaravari Street, Rama Chandra Rao Pet&#10;Eluru - 534002</textarea></div>
        <hr class="sep">
        <div class="fg"><label>Invoice #</label><input type="text" id="iN" placeholder="INV-001"></div>
        <div class="fg"><label>Date</label><input type="date" id="iD"></div>
        <hr class="sep">
        <div class="fg">
            <label>Invoice Items</label>
            <div class="ir-hdr"><span class="h-d">Description</span><span class="h-a">Amount</span><span class="h-x"></span></div>
            <div id="iC"></div>
            <button class="btn btn-add" onclick="aI()">+ Add Item</button>
            <div class="st" id="sT">Subtotal: ₹ 0.00</div>
        </div>
        <hr class="sep">
        <button class="btn btn-g" onclick="go()">Generate Bill</button>
        <button class="btn btn-t" id="tB" onclick="openM()">Choose Template</button>
        <button class="btn btn-s" onclick="window.print()">Print / Save PDF</button>
        <button class="btn btn-d" onclick="rst()">Reset Database</button>
        <div class="hist" id="hB"></div>
    </div>
    <div class="prev"><div id="cv"></div></div>
</div>
<div class="ov" id="mO" onclick="if(event.target===this)closeM()">
    <div class="mdl">
        <div class="mdl-h"><h3>Select Template Style</h3><button class="mdl-x" onclick="closeM()">&times;</button></div>
        <div class="mdl-s"><input type="text" id="tS" placeholder="Search templates..." oninput="flt(this.value)"></div>
        <div class="mdl-b"><div class="grid" id="tG"></div></div>
    </div>
</div>

<script>
const FN=['Poppins','Montserrat','Raleway','Rubik','Lato','Open Sans','Playfair Display','Merriweather','Oswald','Cinzel'];
const AJ=['Royal','Pure','Deep','Soft','Bright','Dark','Rich','Light','Warm','Cool','Bold','Subtle','Fresh','Crisp','Smooth','Sharp','Clean','Grand','Noble','Calm'];
const NN=['Indigo','Emerald','Coral','Slate','Teal','Violet','Crimson','Olive','Navy','Jade','Onyx','Rose','Copper','Moss','Azure','Plum','Gold','Bronze','Ivory','Amber'];
const DK='inv_gen_v6';
let db=JSON.parse(localStorage.getItem(DK))||{};
let sel=null;

Object.keys(db).forEach(k=>{if(typeof db[k]==='object')db[k]=db[k].t!==undefined?db[k].t%100:0;else if(db[k]>=100)db[k]=db[k]%100;});
localStorage.setItem(DK,JSON.stringify(db));

const T=[];
for(let i=0;i<100;i++)T.push({id:i,nm:AJ[i%20]+' '+NN[(i*7)%20],h:i%10,b:(i*3)%10,t:(i*7)%10,hu:Math.round((i*137.508)%360),sa:[70,50,15,80,30][i%5],fn:i%10});

window.onload=function(){
    document.getElementById('iD').valueAsDate=new Date();
    aI('Professional Services Rendered',15000);
    upST();
    buildG();upH();ph();
};

function ph(){document.getElementById('cv').innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;"><div style="font-size:48px;margin-bottom:14px;">&#128196;</div><div style="font-size:15px;font-weight:600;color:#bbb;">No Invoice Generated</div><div style="font-size:12px;margin-top:5px;color:#ccc;">Enter details and click Generate Bill</div></div>';}

/* ---- Item Management ---- */
function aI(desc,val){
    const c=document.getElementById('iC');
    const d=document.createElement('div');
    d.className='ir';
    d.innerHTML='<input class="i-d" placeholder="Description" value="'+(desc||'')+'">' +
        '<input class="i-a" type="number" placeholder="₹" value="'+(val||'')+'" oninput="upST()">' +
        '<button class="rb" onclick="rI(this)" title="Remove item">&times;</button>';
    c.appendChild(d);
    upRB();
    upST();
}
function rI(btn){
    const c=document.getElementById('iC');
    if(c.children.length<=1)return;
    btn.parentElement.remove();
    upRB();upST();
}
function upRB(){
    const rows=document.querySelectorAll('.ir');
    rows.forEach(r=>{r.querySelector('.rb').disabled=rows.length<=1;});
}
function upST(){
    const items=gI();
    const total=items.reduce((s,i)=>s+i.amount,0);
    document.getElementById('sT').textContent='Subtotal: '+fINR(total);
}
function gI(){
    return Array.from(document.querySelectorAll('.ir')).map(r=>({
        desc:r.querySelector('.i-d').value.trim()||'Item',
        amount:parseFloat(r.querySelector('.i-a').value)||0
    }));
}

/* ---- Template Grid ---- */
function buildG(){
    const g=document.getElementById('tG');g.innerHTML='';
    T.forEach(t=>{
        const d=document.createElement('div');
        d.className='card'+(sel===t.id?' sel':'');
        d.dataset.nm=t.nm.toLowerCase();
        d.onclick=()=>pick(t.id);
        const c='hsl('+t.hu+','+t.sa+'%,45%)';
        d.innerHTML='<div class="chk">&#10003;</div><div class="card-top" style="background:'+c+';"><span>INVOICE</span></div><div class="card-mid">'+mP(t,c)+'</div><div class="card-name">'+t.nm+'</div>';
        g.appendChild(d);
    });
}
function mP(t,c){
    const bb=[
        '<div style="display:flex;gap:3px;height:100%;"><div style="flex:1;background:#e8e8e8;border-radius:2px;border-left:3px solid '+c+';"></div><div style="flex:1;background:#e8e8e8;border-radius:2px;border-right:3px solid '+c+';"></div></div>',
        '<div style="display:flex;flex-direction:column;gap:3px;"><div style="height:5px;background:'+c+';border-radius:1px;opacity:.4;"></div><div style="height:3px;background:#ddd;border-radius:1px;"></div><div style="height:3px;background:#ddd;border-radius:1px;"></div></div>',
        '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:4px;height:100%;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.06);"><div style="height:3px;background:#ddd;border-radius:1px;width:50%;margin-bottom:3px;"></div><div style="height:3px;background:'+c+';border-radius:1px;width:25%;margin-left:auto;opacity:.5;"></div></div>',
        '<div style="display:flex;flex-direction:column;gap:5px;padding-top:3px;"><div style="border-bottom:1px dashed #bbb;"></div><div style="border-bottom:1px dashed #bbb;"></div></div>',
        '<div style="display:flex;justify-content:space-between;align-items:center;height:100%;"><div style="height:3px;background:#ddd;width:45%;border-radius:1px;"></div><div style="height:4px;background:'+c+';width:20%;border-radius:1px;opacity:.5;"></div></div>',
        '<div style="display:flex;flex-direction:column;gap:2px;"><div style="height:5px;background:'+c+';border-radius:1px;opacity:.3;"></div><div style="height:5px;background:#f0f0f0;border-radius:1px;"></div><div style="height:5px;background:'+c+';border-radius:1px;opacity:.3;"></div></div>',
        '<div style="display:flex;gap:3px;height:100%;"><div style="flex:1;border:1px solid #ddd;border-radius:3px;padding:3px;"><div style="height:2px;background:#ddd;border-radius:1px;"></div></div><div style="flex:1;border:2px solid '+c+';border-radius:3px;padding:3px;display:flex;align-items:flex-end;justify-content:flex-end;"><div style="height:3px;background:'+c+';width:50%;border-radius:1px;opacity:.4;"></div></div></div>',
        '<div style="display:flex;flex-direction:column;gap:1px;"><div style="height:5px;background:#eee;border-bottom:2px solid #ddd;"></div><div style="height:5px;background:#eee;border-bottom:2px solid #ddd;"></div></div>',
        '<div style="display:flex;flex-direction:column;gap:5px;padding-top:2px;"><div style="display:flex;align-items:center;gap:3px;"><div style="width:4px;height:4px;border-radius:50%;background:'+c+';opacity:.5;flex-shrink:0;"></div><div style="height:3px;background:#ddd;flex:1;border-radius:1px;"></div></div><div style="display:flex;align-items:center;gap:3px;"><div style="width:4px;height:4px;border-radius:50%;background:'+c+';opacity:.5;flex-shrink:0;"></div><div style="height:3px;background:#ddd;flex:1;border-radius:1px;"></div></div></div>',
        '<div style="display:flex;align-items:center;gap:5px;height:100%;"><div style="height:3px;background:#ddd;width:38%;border-radius:1px;"></div><div style="height:4px;background:'+c+';width:18%;border-radius:1px;opacity:.5;"></div></div>'
    ];
    const tt=[
        '<div style="position:absolute;bottom:0;left:0;right:0;height:6px;background:'+c+';opacity:.7;"></div>',
        '<div style="position:absolute;bottom:4px;right:4px;width:20px;height:10px;border-left:3px solid '+c+';background:#f5f5f5;border-radius:2px;"></div>',
        '<div style="position:absolute;bottom:6px;right:6px;width:16px;height:2px;background:'+c+';border-radius:1px;"></div>',
        '<div style="position:absolute;bottom:2px;right:6px;width:10px;height:10px;border-radius:50%;background:'+c+';opacity:.5;"></div>',
        '<div style="position:absolute;bottom:2px;right:4px;width:18px;height:10px;background:#fff;border:1px solid #ddd;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.06);"></div>',
        '<div style="position:absolute;bottom:2px;right:4px;width:18px;height:9px;background:linear-gradient(135deg,'+c+',hsl('+t.hu+','+t.sa+'%,65%));border-radius:3px;"></div>',
        '<div style="position:absolute;bottom:4px;right:6px;"><div style="width:14px;height:2px;background:'+c+';border-radius:1px;margin-bottom:2px;"></div><div style="width:14px;height:2px;background:'+c+';border-radius:1px;"></div></div>',
        '<div style="position:absolute;bottom:2px;right:6px;width:3px;height:11px;background:'+c+';border-radius:1px;"></div>',
        '<div style="position:absolute;bottom:3px;right:4px;width:20px;height:8px;background:'+c+';border-radius:4px;opacity:.5;"></div>',
        ''
    ];
    return bb[t.b]+(tt[t.t]||'');
}

function openM(){document.getElementById('mO').classList.add('on');document.getElementById('tS').value='';flt('');document.getElementById('tS').focus();}
function closeM(){document.getElementById('mO').classList.remove('on');}
function flt(q){q=q.toLowerCase().trim();document.querySelectorAll('.card').forEach(c=>{c.style.display=c.dataset.nm.includes(q)?'':'none';});}
function pick(id){sel=id;document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));document.querySelectorAll('.card')[id].classList.add('sel');document.getElementById('tB').textContent='\u2713 '+T[id].nm;closeM();go();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

/* ---- Generate ---- */
function go(){
    const nm=document.getElementById('pN').value.trim();
    if(!nm)return alert('Please enter Your Name/Company.');
    let tid=sel;
    if(tid===null){tid=db[nm];if(tid===undefined){const u=Object.values(db);do{tid=Math.floor(Math.random()*100);}while(u.includes(tid));db[nm]=tid;localStorage.setItem(DK,JSON.stringify(db));upH();}sel=tid;document.getElementById('tB').textContent='\u2713 '+T[tid].nm;}
    else{db[nm]=tid;localStorage.setItem(DK,JSON.stringify(db));upH();}
    ren(tid);
}

/* ---- Formatters ---- */
function fINR(a){return'\u20B9 '+a.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function nTW(n){
    const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    if(n===0)return'Zero';
    function c1(x){if(x<20)return o[x];return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'');}
    function c2(x){
        let r='';
        if(x>=10000000){r+=c1(Math.floor(x/10000000))+' Crore ';x%=10000000;}
        if(x>=100000){r+=c1(Math.floor(x/100000))+' Lakh ';x%=100000;}
        if(x>=1000){r+=c1(Math.floor(x/1000))+' Thousand ';x%=1000;}
        if(x>=100){r+=o[Math.floor(x/100)]+' Hundred ';x%=100;}
        if(x>0)r+=c1(x);
        return r.trim();
    }
    const ni=Math.floor(n),nd=Math.round((n-ni)*100);
    let w=c2(ni)+' Rupees';if(nd>0)w+=' and '+c2(nd)+' Paise';return w+' Only';
}
function fD(d){if(!d)return'-';return new Date(d).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'});}

/* ---- Render Invoice ---- */
function ren(id){
    const cv=document.getElementById('cv'),t=T[id];
    const items=gI();
    const sub=items.reduce((s,i)=>s+i.amount,0);
    const d={nm:document.getElementById('pN').value,ad:document.getElementById('pA').value,cn:document.getElementById('cN').value,ca:document.getElementById('cA').value,iv:document.getElementById('iN').value||'001',dt:fD(document.getElementById('iD').value),items:items,sub:sub};
    document.title='Invoice_'+d.iv;
    const c='hsl('+t.hu+','+t.sa+'%,45%)',cL='hsl('+t.hu+','+t.sa+'%,92%)',cM='hsl('+t.hu+','+t.sa+'%,65%)',fn=FN[t.fn];
    cv.style.fontFamily="'"+fn+"',sans-serif";
    const as=fINR(d.sub),aw=nTW(d.sub);
    const brk=(t.h===3||t.h===6);
    let html=gH(t.h,d,c,cL,fn)+gM(d,c,brk)+gB(t.b,d.items,c,cL)+gT(t.t,d,c,cL,cM,as,aw)+gS(d.nm);
    cv.innerHTML=html;
}

/* ---- Header ---- */
function gH(s,d,c,cL,fn){
    const h1s='margin:0;font-family:\''+fn+'\',sans-serif;';
    switch(s){
    case 0:return'<div style="text-align:center;padding-bottom:18px;border-bottom:2px solid '+c+';"><div style="width:40px;height:2px;background:'+c+';margin:0 auto 8px;"></div><h1 style="'+h1s+'font-size:30px;color:'+c+';text-transform:uppercase;letter-spacing:1px;">'+d.nm+'</h1><div style="font-size:12px;color:#777;margin-top:4px;">'+d.ad+'</div><div style="width:40px;height:2px;background:'+c+';margin:8px auto 0;"></div></div>';
    case 1:return'<div style="padding-bottom:18px;border-bottom:1px solid #eee;"><h1 style="'+h1s+'font-size:32px;color:'+c+';">'+d.nm+'</h1><div style="font-size:12px;color:#777;margin-top:5px;">'+d.ad+'</div></div>';
    case 2:return'<div style="text-align:center;background:'+cL+';margin:-50px -50px 0;padding:20px 50px 18px;border-bottom:3px solid '+c+';"><h1 style="'+h1s+'font-size:28px;color:'+c+';text-transform:uppercase;letter-spacing:2px;">'+d.nm+'</h1><div style="font-size:12px;color:#666;margin-top:4px;">'+d.ad+'</div></div>';
    case 3:return'<div style="background:'+c+';color:#fff;margin:-50px -50px 0;padding:28px 50px;"><h1 style="'+h1s+'font-size:28px;text-transform:uppercase;letter-spacing:2px;">'+d.nm+'</h1><div style="font-size:12px;opacity:.8;margin-top:4px;">'+d.ad+'</div></div>';
    case 4:return'<div style="display:flex;align-items:center;gap:16px;padding-bottom:18px;border-bottom:1px solid #eee;"><div style="width:50px;height:50px;background:'+c+';border-radius:10px;flex-shrink:0;"></div><div><h1 style="'+h1s+'font-size:24px;color:'+c+';">'+d.nm+'</h1><div style="font-size:12px;color:#777;margin-top:3px;">'+d.ad+'</div></div></div>';
    case 5:return'<div style="text-align:center;padding-bottom:18px;"><h1 style="'+h1s+'font-size:34px;color:'+c+';text-transform:uppercase;letter-spacing:3px;">'+d.nm+'</h1><div style="font-size:12px;color:#999;margin-top:4px;letter-spacing:1px;">'+d.ad+'</div><div style="margin:14px auto 0;width:80px;height:3px;background:'+c+';border-radius:2px;"></div></div>';
    case 6:return'<div style="background:'+c+';color:#fff;margin:-50px -50px 0;padding:22px 50px;text-align:center;"><h1 style="'+h1s+'font-size:26px;text-transform:uppercase;letter-spacing:2px;">'+d.nm+'</h1><div style="font-size:12px;opacity:.8;margin-top:3px;">'+d.ad+'</div></div>';
    case 7:return'<div style="padding-bottom:18px;border-bottom:2px double '+c+';"><h1 style="'+h1s+'font-size:30px;color:'+c+';text-transform:uppercase;letter-spacing:1px;">'+d.nm+'</h1><div style="font-size:12px;color:#777;margin-top:5px;">'+d.ad+'</div></div>';
    case 8:return'<div style="text-align:center;padding-bottom:18px;border-bottom:1px solid #eee;"><div style="display:inline-block;padding:8px 20px;border:2px solid '+c+';border-radius:4px;"><h1 style="'+h1s+'font-size:24px;color:'+c+';text-transform:uppercase;letter-spacing:2px;">'+d.nm+'</h1></div><div style="font-size:12px;color:#777;margin-top:8px;">'+d.ad+'</div></div>';
    case 9:return'<div style="padding-bottom:18px;border-bottom:1px solid #eee;position:relative;"><h1 style="'+h1s+'font-size:30px;color:#333;">'+d.nm+'</h1><div style="font-size:12px;color:#777;margin-top:4px;">'+d.ad+'</div><div style="position:absolute;bottom:-1px;left:0;width:70px;height:3px;background:'+c+';border-radius:2px;"></div></div>';
    }
}

/* ---- Middle (Billed To) ---- */
function gM(d,c,brk){
    const pt=brk?'margin-top:30px;':'';
    return'<div style="display:flex;justify-content:space-between;'+pt+'margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid #eee;"><div><div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;">Billed To</div><div style="font-size:15px;font-weight:700;">'+d.cn+'</div><div style="font-size:12px;color:#666;margin-top:3px;white-space:pre-wrap;">'+d.ca+'</div></div><div style="text-align:right;"><table style="font-size:13px;border-collapse:collapse;"><tr><td style="padding:2px 10px;color:#999;">Invoice #:</td><td style="font-weight:700;">'+d.iv+'</td></tr><tr><td style="padding:2px 10px;color:#999;">Date:</td><td style="font-weight:700;">'+d.dt+'</td></tr></table></div></div>';
}

/* ---- Body (Items) ---- */
function gB(s,items,c,cL){
    switch(s){
    case 0:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            return'<div style="display:grid;grid-template-columns:1fr auto;gap:0;margin-bottom:'+(last?'0':'8px')+';"><div style="background:#f9f9f9;padding:13px 18px;border-radius:8px 0 0 8px;border-left:4px solid '+c+';font-size:13px;">'+it.desc+'</div><div style="background:#f9f9f9;padding:13px 18px;border-radius:0 8px 8px 0;text-align:right;font-weight:700;color:'+c+';font-size:14px;">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;">'+r+'</div>';
    }
    case 1:{
        let rows=items.map((it,i)=>{
            const last=i===items.length-1;
            const bb=last?'none':'1px solid #eee';
            return'<tr><td style="padding:11px 14px;border-bottom:'+bb+';">'+it.desc+'</td><td style="padding:11px 14px;border-bottom:'+bb+';text-align:right;font-weight:700;">'+fINR(it.amount)+'</td></tr>';
        }).join('');
        return'<div style="margin-top:25px;"><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="background:'+c+';color:#fff;padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Description</th><th style="background:'+c+';color:#fff;padding:11px 14px;text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Amount</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
    case 2:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            return'<div style="display:flex;justify-content:space-between;align-items:center;padding:'+(i>0?'12px':'0')+' 0;'+(last?'':'border-bottom:1px solid #eee;')+'"><div style="font-size:13px;">'+it.desc+'</div><div style="font-size:14px;font-weight:700;color:'+c+';">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;border:1px solid #eee;border-radius:12px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.04);">'+r+'</div>';
    }
    case 3:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            let h='<div style="display:flex;justify-content:space-between;padding:12px 0;'+(last?'':'border-bottom:1px dashed #ccc;')+'"><span style="color:#666;font-size:13px;">'+it.desc+'</span><span style="font-weight:700;font-size:13px;">'+fINR(it.amount)+'</span></div>';
            return h;
        }).join('');
        return'<div style="margin-top:25px;">'+r+'</div>';
    }
    case 4:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            return'<div style="display:flex;justify-content:space-between;align-items:center;padding:'+(i>0?'10px':'0')+' 0;'+(last?'':'border-bottom:1px solid rgba(0,0,0,.06);')+'"><div style="font-size:13px;">'+it.desc+'</div><div style="font-size:14px;font-weight:700;color:'+c+';">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;background:'+cL+';border-radius:10px;padding:18px;">'+r+'</div>';
    }
    case 5:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            const bg=i%2===0?'#f5f5f5':'#fff';
            return'<tr style="background:'+bg+';"><td style="padding:11px 14px;font-size:12px;color:#999;text-transform:uppercase;width:30%;">'+it.desc+'</td><td style="padding:11px 14px;font-size:14px;font-weight:700;color:'+c+';">'+fINR(it.amount)+'</td></tr>';
        }).join('');
        return'<div style="margin-top:25px;"><table style="width:100%;border-collapse:collapse;">'+r+'</table></div>';
    }
    case 6:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            const mb=last?'0':'12px';
            return'<div style="display:flex;gap:14px;margin-bottom:'+mb+';"><div style="flex:1;border:1px solid #eee;border-radius:8px;padding:14px;font-size:13px;">'+it.desc+'</div><div style="flex:0 0 160px;border:2px solid '+c+';border-radius:8px;padding:14px;text-align:right;display:flex;align-items:center;justify-content:flex-end;font-weight:700;color:'+c+';font-size:14px;">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;">'+r+'</div>';
    }
    case 7:{
        let rows=items.map((it,i)=>{
            const last=i===items.length-1;
            const bb=last?'none':'1px solid #eee';
            return'<tr><td style="padding:11px 14px;border-bottom:'+bb+';font-size:13px;">'+it.desc+'</td><td style="padding:11px 14px;border-bottom:'+bb+';text-align:right;font-weight:700;font-size:13px;">'+fINR(it.amount)+'</td></tr>';
        }).join('');
        return'<div style="margin-top:25px;"><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="padding:10px 14px;text-align:left;font-size:11px;color:'+c+';border-bottom:2px solid '+c+';text-transform:uppercase;letter-spacing:.5px;">Description</th><th style="padding:10px 14px;text-align:right;font-size:11px;color:'+c+';border-bottom:2px solid '+c+';text-transform:uppercase;letter-spacing:.5px;">Amount</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
    case 8:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:'+(last?'0':'12px')+';"><div style="width:8px;height:8px;border-radius:50%;background:'+c+';flex-shrink:0;"></div><div style="flex:1;font-size:13px;">'+it.desc+'</div><div style="font-weight:700;color:'+c+';font-size:13px;">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;">'+r+'</div>';
    }
    case 9:{
        let r=items.map((it,i)=>{
            const last=i===items.length-1;
            return'<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 22px;background:'+(i%2===0?'#fafafa':'#fff')+';border-radius:8px;border:1px solid #eee;margin-bottom:'+(last?'0':'6px')+';"><div style="font-size:13px;font-weight:500;">'+it.desc+'</div><div style="font-size:14px;font-weight:700;color:'+c+';">'+fINR(it.amount)+'</div></div>';
        }).join('');
        return'<div style="margin-top:25px;">'+r+'</div>';
    }
    }
}

/* ---- Total ---- */
function gT(s,d,c,cL,cM,as,aw){
    switch(s){
    case 0:return'<div style="background:'+c+';color:#fff;margin:35px -50px 0;padding:28px 50px;text-align:right;"><div style="font-size:11px;text-transform:uppercase;opacity:.7;letter-spacing:.5px;">Grand Total</div><div style="font-size:30px;font-weight:700;margin-top:2px;">'+as+'</div></div><div style="margin:18px -50px 0;padding:10px 50px;background:rgba(0,0,0,.03);font-size:12px;color:#666;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 1:return'<div style="text-align:right;margin-top:35px;"><div style="display:inline-block;background:#f5f5f5;padding:12px 22px;border-radius:6px;border-left:4px solid '+c+';"><div style="font-size:10px;color:#999;text-transform:uppercase;">Grand Total</div><div style="font-size:26px;font-weight:700;color:'+c+';margin-top:2px;">'+as+'</div></div></div><div style="margin-top:16px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 2:return'<div style="text-align:right;margin-top:35px;"><div style="border-top:2px solid '+c+';display:inline-block;padding-top:10px;"><span style="font-size:11px;color:#999;text-transform:uppercase;">Total Due: </span><span style="font-size:24px;font-weight:700;color:'+c+';">'+as+'</span></div></div><div style="margin-top:16px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 3:return'<div style="margin-top:35px;text-align:center;padding:20px;border:2px solid '+c+';border-radius:10px;"><div style="font-size:10px;color:'+c+';text-transform:uppercase;letter-spacing:1px;">Grand Total</div><div style="font-size:32px;font-weight:700;color:'+c+';margin-top:4px;">'+as+'</div></div><div style="margin-top:16px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 4:return'<div style="display:flex;justify-content:flex-end;margin-top:35px;"><div style="width:220px;background:'+cL+';border-radius:10px;padding:18px;text-align:center;"><div style="font-size:10px;color:'+c+';text-transform:uppercase;letter-spacing:.5px;">Amount Payable</div><div style="font-size:24px;font-weight:700;color:'+c+';margin-top:4px;">'+as+'</div></div></div><div style="margin-top:16px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 5:return'<div style="background:linear-gradient(135deg,'+c+','+cM+');color:#fff;margin:35px -50px 0;padding:28px 50px;text-align:right;"><div style="font-size:11px;text-transform:uppercase;opacity:.75;letter-spacing:.5px;">Grand Total</div><div style="font-size:30px;font-weight:700;margin-top:2px;">'+as+'</div></div><div style="margin:18px -50px 0;padding:10px 50px;background:rgba(0,0,0,.02);font-size:12px;color:#666;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 6:return'<div style="margin-top:35px;display:flex;gap:20px;"><div style="flex:1;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div><div style="text-align:right;"><div style="font-size:10px;color:#999;text-transform:uppercase;">Total</div><div style="font-size:26px;font-weight:700;color:'+c+';">'+as+'</div></div></div>';
    case 7:return'<div style="margin-top:35px;text-align:right;"><div style="font-size:10px;color:#999;text-transform:uppercase;">Grand Total</div><div style="font-size:36px;font-weight:700;color:'+c+';margin-top:2px;line-height:1.1;">'+as+'</div></div><div style="margin-top:14px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    case 8:return'<div style="margin-top:35px;padding:18px;background:'+cL+';border-radius:8px;border-left:5px solid '+c+';display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div><div style="text-align:right;"><div style="font-size:10px;color:'+c+';text-transform:uppercase;">Total</div><div style="font-size:24px;font-weight:700;color:'+c+';">'+as+'</div></div></div>';
    case 9:return'<div style="margin-top:35px;text-align:right;"><div style="display:inline-block;border:2px solid '+c+';border-radius:10px;padding:16px 28px;"><div style="font-size:10px;color:'+c+';text-transform:uppercase;letter-spacing:1px;">Grand Total</div><div style="font-size:28px;font-weight:700;color:'+c+';margin-top:4px;">'+as+'</div></div></div><div style="margin-top:16px;padding:8px 12px;background:#f8f9fa;border:1px dashed #ccc;border-radius:4px;font-size:12px;color:#555;">Rupees in words: <strong>'+aw+'</strong></div>';
    }
}

/* ---- Signature ---- */
function gS(nm){
    return'<div style="margin-top:50px;width:240px;margin-left:auto;text-align:center;"><div style="border-top:1px solid #333;padding-top:4px;"><div style="font-size:12px;color:#555;font-weight:700;">Authorized Signatory</div><div style="font-size:10px;color:#999;margin-top:2px;">For '+nm+'</div></div></div>';
}

/* ---- History & Reset ---- */
function upH(){
    const b=document.getElementById('hB'),k=Object.keys(db);
    if(!k.length){b.innerHTML='<div class="hist-t">No history</div>';return;}
    b.innerHTML='<div class="hist-t">History</div>';
    k.forEach(n=>{const s=document.createElement('span');s.className='badge';s.textContent=n;s.onclick=()=>{document.getElementById('pN').value=n;go();};b.appendChild(s);});
}
function rst(){if(confirm('Reset all data?')){localStorage.removeItem(DK);db={};sel=null;document.getElementById('tB').textContent='Choose Template';location.reload();}}
</script>
</body>
</html>
