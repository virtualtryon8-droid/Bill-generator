<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Indian Bill Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Montserrat:wght@400;600&family=Merriweather:wght@300;700&family=Open+Sans:wght@400;600&family=Oswald:wght@300;500&family=Raleway:wght@400;600&family=Poppins:wght@400;600;700&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BASE STYLES --- */
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef1f5; margin: 0; padding: 20px; color: #333; font-size: 14px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* --- INPUT PANEL --- */
        .input-panel { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: fit-content; }
        h2 { margin-top: 0; font-size: 18px; color: #2c3e50; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 12px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: #888; outline: none; }
        
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: transform 0.1s; }
        button:hover { transform: translateY(-1px); }
        
        .utility-btn { background: #aab; box-shadow: none; margin-top: 5px; font-size: 12px; background-image: none; }
        .utility-btn.danger { background: #e74c3c; }
        
        .client-list { margin-top: 20px; max-height: 200px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .client-badge { display: inline-block; background: #f0f2f5; padding: 4px 8px; border-radius: 20px; font-size: 11px; margin: 2px; cursor: pointer; }

        /* --- PREVIEW PANEL --- */
        .preview-panel { flex: 2; background: #eef1f5; padding: 30px; border-radius: 12px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        
        /* --- CANVAS BASE --- */
        #invoice-canvas {
            background: white; width: 210mm; min-height: 297mm; box-sizing: border-box; position: relative; overflow: hidden;
            font-family: var(--font-body); color: var(--text-color); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
            padding: 50px;
        }

        /* --- HEADER: STRICTLY CENTERED --- */
        .letterhead-center {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }
        .letterhead-center h1 {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 32px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .letterhead-center .address {
            margin-top: 5px;
            font-size: 13px;
            color: #666;
            font-weight: 400;
        }
        .style-ornament { display: inline-block; width: 50px; height: 2px; background: var(--primary-color); margin-bottom: 10px; }

        /* --- BODY LAYOUT VARIATIONS --- */
        .layout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px; }
        .layout-grid .box { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary-color); }
        
        .layout-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .layout-table th { background: var(--primary-color); color: white; padding: 12px; text-align: left; }
        .layout-table td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .layout-card { margin-top: 30px; border: 1px solid #eee; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .layout-list { margin-top: 30px; width: 100%; }
        .layout-list .row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed #ccc; }

        /* --- TOTAL SECTIONS --- */
        .total-section-right { text-align: right; margin-top: 40px; }
        .total-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .total-amount { font-size: 28px; font-weight: 700; color: var(--primary-color); font-family: var(--font-heading); }
        
        .total-banner { background: var(--primary-color); color: white; margin: 40px -50px -50px -50px; padding: 30px 50px; text-align: right; }
        .total-banner .total-amount { color: white; }
        
        /* Print */
        @media print {
            body { background: white; padding: 0; }
            .container { display: block; }
            .input-panel { display: none !important; }
            .preview-panel { padding: 0; background: white; box-shadow: none; }
            #invoice-canvas { box-shadow: none; width: 100%; min-height: auto; border-radius: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <h2>Bill Generator</h2>
        <div class="form-group">
            <label>Person / Company Name *</label>
            <input type="text" id="pName" placeholder="Enter Name">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea id="pAddress" rows="2">Hyderabad, Telangana, India</textarea>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin: 15px 0;">
        <div class="form-group">
            <label>Client Name</label>
            <input type="text" id="cName" value="VASAVI SILKS PRIVATE LIMITED">
        </div>
        <div class="form-group">
            <label>Invoice #</label>
            <input type="text" id="invNo" placeholder="INV-001">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="invDate">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="desc" rows="2">Professional Services Rendered</textarea>
        </div>
        <div class="form-group">
            <label>Amount (INR)</label>
            <input type="number" id="amt" value="15000">
        </div>
        <button onclick="processInvoice()">Generate Bill</button>
        <button class="utility-btn" onclick="window.print()">Print / PDF</button>
        <button class="utility-btn danger" onclick="resetAll()" style="margin-top:15px;">Reset Database</button>
        <div class="client-list" id="historyBox"></div>
    </div>

    <div class="preview-panel">
        <div id="invoice-canvas"></div>
    </div>
</div>

<script>
    /* 
       CORRECTED ENGINE
       --------------------
       - Fixed Syntax Error.
       - Centered Letterhead.
       - Indian Currency (INR).
       - NO FOOTER TEXT.
    */

    const MAX_TEMPLATES = 54000; 
    const FONTS = ['Poppins', 'Montserrat', 'Raleway', 'Rubik', 'Lato', 'Open Sans', 'Playfair Display', 'Merriweather', 'Oswald', 'Cinzel'];
    const DB_KEY = 'invoice_generator_center_v1';
    
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};
    
    window.onload = function() {
        // CORRECTED LINE: Fixed quote mismatch
        document.getElementById('invDate').valueAsDate = new Date();
        updateHistory();
    };

    function processInvoice() {
        const name = document.getElementById('pName').value.trim();
        if (!name) return alert("Please enter a Person/Company Name.");

        let templateId = db[name];

        if (templateId === undefined) {
            const usedIds = Object.values(db);
            let newId;
            do { newId = Math.floor(Math.random() * MAX_TEMPLATES); } while (usedIds.includes(newId));

            db[name] = newId;
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            templateId = newId;
            updateHistory();
        }

        renderInvoice(templateId);
    }

    // Indian Numbering System Formatter
    function formatINR(amount) {
        return '₹ ' + amount.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderInvoice(id) {
        const container = document.getElementById('invoice-canvas');
        const data = {
            name: document.getElementById('pName').value,
            address: document.getElementById('pAddress').value,
            client: document.getElementById('cName').value,
            inv: document.getElementById('invNo').value || '001',
            date: formatDate(document.getElementById('invDate').value),
            desc: document.getElementById('desc').value,
            amt: parseFloat(document.getElementById('amt').value) || 0
        };

        // --- PROCEDURAL GENERATION ---
        const structureIndex = id % 100;
        
        // 1. COLORS
        const hue = (id * 137.508) % 360;
        const styleType = id % 3;
        let primaryColor;
        
        if (styleType === 0) primaryColor = `hsl(${hue}, 70%, 45%)`;
        else if (styleType === 1) primaryColor = `hsl(${hue}, 50%, 35%)`;
        else primaryColor = `hsl(${hue}, 15%, 25%)`;

        // 2. FONTS
        const fontId = Math.floor(id / 10) % FONTS.length;
        const selectedFont = FONTS[fontId];

        container.style.setProperty('--primary-color', primaryColor);
        container.style.setProperty('--font-heading', `'${selectedFont}', sans-serif`);
        container.style.setProperty('--font-body', `'${selectedFont}', sans-serif`);
        
        // 3. BODY LAYOUT SELECTION
        const layoutIdx = Math.floor(structureIndex / 20) % 4;

        // --- HTML CONSTRUCTION ---

        // 1. CENTERED LETTERHEAD
        let html = `
            <div class="letterhead-center">
                <div class="style-ornament"></div>
                <h1>${data.name}</h1>
                <div class="address">${data.address}</div>
            </div>
        `;

        // 2. INVOICE META INFO
        html += `
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <div>
                    <strong style="color:#888; font-size:11px; text-transform:uppercase;">Billed To</strong><br>
                    <span style="font-size:15px; font-weight:600;">${data.client}</span>
                </div>
                <div style="text-align:right;">
                    <table style="font-size:13px;">
                        <tr><td style="padding:3px 10px; color:#888;">Invoice #:</td><td style="font-weight:600;">${data.inv}</td></tr>
                        <tr><td style="padding:3px 10px; color:#888;">Date:</td><td style="font-weight:600;">${data.date}</td></tr>
                    </table>
                </div>
            </div>
        `;

        // 3. BODY LAYOUT
        const displayAmt = formatINR(data.amt);

        if (layoutIdx === 0) {
            html += `
                <div class="layout-grid">
                    <div class="box">
                        <strong style="color:var(--primary-color); font-size:12px;">SERVICE DESCRIPTION</strong>
                        <p style="margin:10px 0 0 0; font-size:14px;">${data.desc}</p>
                    </div>
                    <div class="box" style="text-align:right;">
                        <strong style="color:var(--primary-color); font-size:12px;">AMOUNT</strong>
                        <p style="margin:10px 0 0 0; font-size:18px; font-weight:600;">${displayAmt}</p>
                    </div>
                </div>
            `;
        } else if (layoutIdx === 1) {
            html += `
                <table class="layout-table">
                    <thead>
                        <tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${data.desc}</td>
                            <td>1</td>
                            <td>${displayAmt}</td>
                            <td style="font-weight:700;">${displayAmt}</td>
                        </tr>
                    </tbody>
                </table>
            `;
        } else if (layoutIdx === 2) {
            html += `
                <div class="layout-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <div style="font-size:12px; color:#888;">Service Item</div>
                        <div style="font-size:12px; color:#888;">Amount</div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:16px; font-weight:600;">${data.desc}</div>
                        <div style="font-size:16px; color:var(--primary-color); font-weight:700;">${displayAmt}</div>
                    </div>
                </div>
            `;
        } else {
            html += `
                <div class="layout-list">
                    <div class="row">
                        <span style="color:#666;">Description</span>
                        <span>${data.desc}</span>
                    </div>
                    <div class="row" style="border:none;">
                        <span style="color:#666;">Amount</span>
                        <span style="font-weight:700;">${displayAmt}</span>
                    </div>
                </div>
            `;
        }

        // 4. TOTAL SECTION
        const totalStyle = id % 3;
        
        if (totalStyle === 0) {
            html += `
                <div class="total-section-right">
                    <div style="background:#f5f5f5; display:inline-block; padding:10px 20px; border-radius:4px; border-left:4px solid var(--primary-color);">
                        <div class="total-label">Grand Total</div>
                        <div class="total-amount">${displayAmt}</div>
                    </div>
                </div>
            `;
        } else if (totalStyle === 1) {
            html += `
                <div style="text-align:right; margin-top:40px;">
                    <div style="border-top:2px solid var(--primary-color); display:inline-block; padding-top:10px;">
                        <span style="font-size:12px; color:#888;">Total Due: </span>
                        <span style="font-size:24px; font-weight:bold; color:var(--primary-color);">${displayAmt}</span>
                    </div>
                </div>
            `;
        } else {
            html += `
                <div class="total-banner">
                    <span class="total-label" style="color:rgba(255,255,255,0.8);">Grand Total</span><br>
                    <span class="total-amount">${displayAmt}</span>
                </div>
            `;
        }

        // 5. FOOTER REMOVED COMPLETELY
        
        container.innerHTML = html;
    }

    function updateHistory() {
        const box = document.getElementById('historyBox');
        const keys = Object.keys(db);
        if(keys.length === 0) { box.innerHTML = "<div style='color:#aaa; font-size:11px;'>No history.</div>"; return; }
        box.innerHTML = `<div style="font-size:11px; color:#666; margin-bottom:5px;">History:</div>`;
        keys.forEach(k => {
            let badge = document.createElement('span');
            badge.className = 'client-badge';
            badge.innerText = k;
            badge.onclick = () => { document.getElementById('pName').value = k; processInvoice(); };
            box.appendChild(badge);
        });
    }

    function resetAll() { if(confirm("Reset?")) { localStorage.removeItem(DB_KEY); db = {}; location.reload(); } }
    function formatDate(d) { if(!d) return '-'; return new Date(d).toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' }); }
</script>
</body>
</html>
